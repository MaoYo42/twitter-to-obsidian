name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m compileall -f tools/ -q
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 tools/ --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Module import check
        run: |
          python -c "
import sys
sys.path.insert(0, 'tools')
import common
import twitter_fetch
print('All imports OK - pure stdlib')
"
